name: Validate & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate garage-reference.json
        run: |
          python3 -c "
          import json, sys
          with open('garage-reference.json') as f:
              data = json.load(f)
          bikes = data.get('bikes', [])
          assert isinstance(bikes, list), 'bikes must be an array'
          assert len(bikes) > 0, 'bikes array is empty'
          required = ['make', 'model', 'year']
          for i, b in enumerate(bikes):
              for field in required:
                  assert field in b, f'bike[{i}] missing required field: {field}'
          print(f'OK — {len(bikes)} bike(s) validated')
          "

  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
